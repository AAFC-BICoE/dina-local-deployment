apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: {{ .Values.app.name }}
  name: {{ .Values.app.name }}-search-ws
spec:
  replicas: {{ if and .Values.profiles.search_api.enabled (not (or .Values.global.environment.config.db_init.restore_db .Values.global.environment.config.db_init.reset_users)) }}1{{ else }}0{{ end }}
  selector:
    matchLabels:
      app: {{ .Values.app.name }}-search-ws
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0  
  template:
    metadata:
      annotations: {}
      creationTimestamp: null
      labels:
        app: {{ .Values.app.name }}-search-ws
    spec:
      containers:
        - name: search-ws
          image: {{ .Values.services.searchws.image }}
          env:
            - name: ELASTICSEARCH_HOST
              value: {{ tpl .Values.services.searchws.environment.elasticsearch.host . }}
            - name: ELASTICSEARCH_USERNAME
              value: {{ tpl .Values.services.searchcli.environment.elasticsearch.username . }}
            - name: ELASTICSEARCH_PASSWORD
              {{- if not .Values.global.environment.config.elasticsearch.password }}
              valueFrom:
                secretKeyRef:
                  name: elasticsearch-secret
                  key: password
              {{- else }}
              value: {{ tpl .Values.global.environment.config.elasticsearch.password . }}
              {{- end }}
            - name: ELASTICSEARCH_CERTPATH
              value: {{ tpl .Values.services.searchcli.environment.elasticsearch.certPath . }}
          ports:
            - name: http
              containerPort: 8085
          readinessProbe:
            tcpSocket:
              port: 8085
            initialDelaySeconds: 5
            periodSeconds: 1
          resources:
            requests:
              memory: {{ .Values.resources.apis.requests.memory }}
              cpu: {{ .Values.resources.apis.requests.cpu }}            
            limits:
              memory: {{ .Values.resources.apis.limits.memory }} 
              cpu: {{ .Values.resources.apis.limits.cpu }}
          volumeMounts:
            - name: es-certs
              mountPath: /app/certs:ro
  volumeClaimTemplates:
  - metadata:
      name: es-certs
    spec:
      accessModes: [ "ReadOnlyMany" ]
      storageClassName: {{ .Values.global.environment.storageClass }}
      resources:
        requests:
          storage: 100Mi