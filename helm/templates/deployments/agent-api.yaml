apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: {{ .Values.app.name }}
  name: {{ .Values.app.name }}-{{ .Values.global.environment.config.agent_api.label }}
spec:
  replicas: {{ if and .Values.profiles.agent_api.enabled (not (or .Values.global.environment.config.db_init.restore_db .Values.global.environment.config.db_init.reset_users)) }}1{{ else }}0{{ end }}
  selector:
    matchLabels:
      app: {{ .Values.app.name }}-{{ .Values.global.environment.config.agent_api.label }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0  
  template:
    metadata:
      annotations: {}
      creationTimestamp: null
      labels:
        app: {{ .Values.app.name }}-{{ .Values.global.environment.config.agent_api.label }}
    spec:
      initContainers:
        {{- include "dina-helm.initContainer.checkDb" . | nindent 8 }}
        {{- include "dina-helm.initContainer.initDb" (dict "root" . "serviceKey" "agentapi" "environmentKey" "agent_api" "shortName" "agent") | nindent 8 }}
      containers:
        - name: agent-api
          {{- with .Values.agentapi.image }}
          image: {{ include "dina-helm.build-image-name" . | quote }}
          imagePullPolicy: {{ .pullPolicy | default "IfNotPresent" | quote }}
          {{- end }}
          {{- if .Values.messageProducerOverride.enabled }}
          envFrom:
            - configMapRef:
                name: message-producer-override-agentapi
          {{- end }}
          env:
            - name: KEYCLOAK_ENABLED
              value: {{ .Values.global.environment.keycloak.enabled | quote }}
            - name: SPRING_DATASOURCE_URL
              value: {{ tpl .Values.services.agentapi.environment.spring.datasource.url . }}
            - name: SPRING_DATASOURCE_USERNAME
              value: {{ .Values.services.agentapi.environment.spring.datasource.username }}
            - name: SPRING_DATASOURCE_PASSWORD
              {{- if .Values.services.agentapi.environment.spring.datasource.password }}
              value: {{ .Values.services.agentapi.environment.spring.datasource.password }}
              {{- else }}
              valueFrom:
                secretKeyRef:
                  name: agentapi-datasource-secret
                  key: password
              {{- end }}
            - name: SPRING_LIQUIBASE_USER
              value: {{ .Values.services.agentapi.environment.spring.liquibase.username }}
            - name: SPRING_LIQUIBASE_PASSWORD
              {{- if .Values.services.agentapi.environment.spring.liquibase.password }}
              value: {{ .Values.services.agentapi.environment.spring.liquibase.password }}
              {{- else }}
              valueFrom:
                secretKeyRef:
                  name: agentapi-liquibase-secret
                  key: password
              {{- end }}
            - name: SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER-URI
              value: {{ tpl .Values.global.environment.spring.security.oauth2.resourceserver.jwt.issuer_uri . | quote }}
            - name: SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK-SET-URI
              value: {{ tpl .Values.global.environment.spring.security.oauth2.resourceserver.jwt.jwk_set_uri . | quote }}
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 1
          resources:
            requests:
              memory: {{ .Values.resources.apis.requests.memory }}
              cpu: {{ .Values.resources.apis.requests.cpu }}            
            limits:
              memory: {{ .Values.resources.apis.limits.memory }} 
              cpu: {{ .Values.resources.apis.limits.cpu }}
status: {}
